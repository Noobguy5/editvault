<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Edit Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0B0B;
            --card-bg: #171717;
            --accent-color: #FF4D8D;
            --accent-glow: rgba(255, 77, 141, 0.15);
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --glass-bg: rgba(23, 23, 23, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
            --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #252525;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #353535;
        }

        /* --- LANDING PAGE --- */
        #landing-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }

        #landing-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .landing-content {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .landing-title {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .landing-subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 3rem;
            letter-spacing: -0.01em;
        }

        .landing-btn {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 500px;
            cursor: pointer;
            transition: var(--transition-smooth);
            letter-spacing: -0.01em;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .landing-btn:hover {
            transform: translateY(-2px);
            background-color: var(--accent-color);
            color: var(--text-main);
            box-shadow: 0 15px 35px var(--accent-glow);
        }

        /* --- VAULT APP --- */
        #vault-app {
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
            padding-bottom: 8rem;
        }

        #vault-app.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 11, 11, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.5rem 2rem;
            margin-bottom: 3rem;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }

        .controls-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-grow: 1;
            justify-content: flex-end;
            max-width: 700px;
        }

        .search-wrapper {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1.2rem 0.8rem 2.8rem;
            color: var(--text-main);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .search-input:focus + .search-icon {
            fill: var(--accent-color);
        }

        .random-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            white-space: nowrap;
        }

        .random-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
            transform: translateY(-1px);
        }

        .stats-badge {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1rem;
            border-radius: 500px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* Grid */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Card Component */
        .edit-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            aspect-ratio: 16 / 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .edit-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .thumbnail-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(11,11,11,0.9) 100%);
            z-index: 1;
            overflow: hidden;
        }

        /* Use thumbnail video generation helper via JS */
        .card-video-hint {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
            transition: var(--transition-smooth);
            filter: grayscale(30%);
        }

        .edit-card:hover .card-video-hint {
            opacity: 0.5;
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        .card-meta {
            position: relative;
            z-index: 2;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .play-indicator {
            width: 38px;
            height: 38px;
            border-radius: 500px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition-smooth);
        }

        .play-indicator svg {
            width: 14px;
            height: 14px;
            fill: var(--text-main);
            transform: translateX(1px);
            transition: var(--transition-smooth);
        }

        .edit-card:hover .play-indicator {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(1.1);
        }

        .edit-card:hover .play-indicator svg {
            fill: var(--text-main);
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 6rem 2rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            background-color: rgba(255, 255, 255, 0.01);
            display: none;
        }

        /* --- VIDEO PLAYER MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-window {
    width: 75%;
    max-width: 850px;
    border-radius: 24px;
    overflow: hidden;
    background-color: #121212;
    border: 1px solid rgba(255,255,255,.06);
    box-shadow: 0 30px 70px rgba(0,0,0,.8);
    transform: scale(.95) translateY(10px);
    transition: transform .5s cubic-bezier(.16,1,.3,1);
    display: flex;
    flex-direction: column;
    position: relative;
}

        .modal-overlay.active .modal-window {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(23,23,23,0.5) 0%, rgba(23,23,23,0) 100%);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .close-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            pointer-events: auto;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .close-btn:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .close-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--text-main);
        }

        .video-container {
    width: 100%;
    aspect-ratio: 16 / 9;
    max-height: 70vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
}

       .main-video-player {
    width: 100%;
    max-height: 70vh;
    height: auto;
    object-fit: contain;
    display: block;
}

        /* Player Navigation Overlays */
        .nav-trigger {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(18, 18, 18, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition-smooth);
            z-index: 5;
        }

        .video-container:hover .nav-trigger {
            opacity: 1;
        }

        .nav-trigger:hover {
            background: rgba(235, 235, 235, 0.95);
        }

        .nav-trigger:hover svg {
            fill: var(--bg-color);
        }

        .nav-trigger.prev-trigger { left: 2rem; }
        .nav-trigger.next-trigger { right: 2rem; }

        .nav-trigger svg {
            width: 18px;
            height: 18px;
            fill: var(--text-main);
            transition: fill 0.2s;
        }

        /* Universal Loader */
        .spinner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
            z-index: 2;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adaptation */
        @media (max-width: 768px) {
            .landing-title { font-size: 3rem; }
            .header-container { flex-direction: column; align-items: stretch; gap: 1.2rem; }
            .controls-area { max-width: 100%; width: 100%; }
            .nav-trigger { width: 44px; height: 44px; opacity: 1; }
            .nav-trigger.prev-trigger { left: 0.5rem; }
            .nav-trigger.next-trigger { right: 0.5rem; }
            .modal-window { width: 100%; border-radius: 0; border: none; }
        }
    </style>
</head>
<body>

    <div id="landing-screen">
        <div class="landing-content">
            <h1 class="landing-title">The Edit Vault</h1>
            <p class="landing-subtitle">122 memories. One place.</p>
            <button class="landing-btn" id="open-vault-btn">Open Vault</button>
        </div>
    </div>

    <div id="vault-app">
        <header>
            <div class="header-container">
                <div class="logo-area">
                    <h1>The Edit Vault</h1>
                </div>
                <div class="controls-area">
                    <div class="search-wrapper">
                        <input type="text" id="search-input" class="search-input" placeholder="Search across vault (e.g. 012)..." autocomplete="off">
                        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    </div>
                    <button id="random-btn" class="random-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                        Random
                    </button>
                    <div class="stats-badge" id="stats-badge">122 Total Edits</div>
                </div>
            </div>
        </header>

        <main>
            <div class="vault-grid" id="vault-grid">
                </div>
            <div class="empty-state" id="empty-state">
                No archived memories match your inquiry.
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="player-modal">
        <div class="modal-window">
            <div class="modal-header">
                <div class="modal-title" id="modal-video-title">Edit #000</div>
                <button class="close-btn" id="modal-close-btn" aria-label="Close Player">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="video-container">
                <div class="spinner" id="video-spinner"></div>
                <video class="main-video-player" id="main-player" controls controlsList="nodownload" playsinline></video>
                
                <div class="nav-trigger prev-trigger" id="modal-prev-btn" title="Previous Edit (←)">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </div>
                <div class="nav-trigger next-trigger" id="modal-next-btn" title="Next Edit (→)">
                    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- VAULT ARCHIVE CONFIGURATION ---
        const totalVideos = 122;
        const videoDirectory = "videos/";
        
        // --- DOM REFERENCE NODE MAP ---
        const landingScreen = document.getElementById('landing-screen');
        const openVaultBtn = document.getElementById('open-vault-btn');
        const vaultApp = document.getElementById('vault-app');
        const vaultGrid = document.getElementById('vault-grid');
        const searchInput = document.getElementById('search-input');
        const randomBtn = document.getElementById('random-btn');
        const statsBadge = document.getElementById('stats-badge');
        const emptyState = document.getElementById('empty-state');
        
        const playerModal = document.getElementById('player-modal');
        const mainPlayer = document.getElementById('main-player');
        const modalVideoTitle = document.getElementById('modal-video-title');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const modalPrevBtn = document.getElementById('modal-prev-btn');
        const modalNextBtn = document.getElementById('modal-next-btn');
        const videoSpinner = document.getElementById('video-spinner');

        // State Machine Core
        let activeArchiveIndex = null; 
        let viewFilteredCollection = [];

        // --- DYNAMIC RUNTIME INITIALIZATION ---
        function generateVaultCore() {
            statsBadge.textContent = `${totalVideos} Total Edits`;
            vaultGrid.innerHTML = '';
            viewFilteredCollection = [];

            for (let i = 1; i <= totalVideos; i++) {
                const padString = String(i).padStart(3, '0');
                const pathUri = `${videoDirectory}${padString}.mp4`;
                
                viewFilteredCollection.push({ id: i, padId: padString, src: pathUri });

                const card = document.createElement('div');
                card.className = 'edit-card';
                card.setAttribute('data-id', i);
                card.setAttribute('data-pad-id', padString);

                card.innerHTML = `
                    <div class="thumbnail-container">
                        <video class="card-video-hint" src="${pathUri}" preload="metadata" muted loop playsinline></video>
                    </div>
                    <div class="card-meta">
                        <div class="card-title">Edit #${padString}</div>
                        <div class="play-indicator">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                `;

                // Hover Dynamic Preview Listeners
                const previewVideo = card.querySelector('.card-video-hint');
                card.addEventListener('mouseenter', () => {
                    const playPromise = previewVideo.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => { /* Safe fail silently if blocked by context policy */ });
                    }
                });
                card.addEventListener('mouseleave', () => {
                    previewVideo.pause();
                    previewVideo.currentTime = 0;
                });

                // Launch Modal Interaction Trigger
                card.addEventListener('click', () => launchPlayerModal(i));

                vaultGrid.appendChild(card);
            }
        }

        // --- FILTER APPLICATION MACHINE ---
        function executeVaultFilter(queryTerm) {
            const parsedQuery = queryTerm.trim().toLowerCase();
            const cards = vaultGrid.querySelectorAll('.edit-card');
            let matchedCounter = 0;
            let trackingCollection = [];

            cards.forEach(card => {
                const cardIdStr = card.getAttribute('data-id');
                const cardPadIdStr = card.getAttribute('data-pad-id');
                
                if (cardIdStr.includes(parsedQuery) || cardPadIdStr.includes(parsedQuery)) {
                    card.style.display = 'flex';
                    matchedCounter++;
                    trackingCollection.push({
                        id: parseInt(cardIdStr, 10),
                        padId: cardPadIdStr,
                        src: `${videoDirectory}${cardPadIdStr}.mp4`
                    });
                } else {
                    card.style.display = 'none';
                }
            });

            viewFilteredCollection = trackingCollection;
            emptyState.style.display = (matchedCounter === 0) ? 'block' : 'none';
        }

        // --- MODAL VIEWER LOGIC SUBSYSTEM ---
        function launchPlayerModal(id) {
            const activeObject = viewFilteredCollection.find(item => item.id === id);
            if (!activeObject) return;

            activeArchiveIndex = id;
            modalVideoTitle.textContent = `Edit #${activeObject.padId}`;
            
            // Set spinner state
            videoSpinner.style.display = 'block';
            mainPlayer.src = activeObject.src;
            mainPlayer.load();

            playerModal.classList.add('active');
            document.body.style.overflow = 'hidden';

            mainPlayer.play().catch(() => { /* Interactive safe catch block context policy */ });
        }

        function closePlayerModal() {
            playerModal.classList.remove('active');
            document.body.style.overflow = '';
            mainPlayer.pause();
            mainPlayer.src = "";
            activeArchiveIndex = null;
        }

        function traverseModalIndex(direction) {
            if (viewFilteredCollection.length === 0) return;
            
            let currentIndex = viewFilteredCollection.findIndex(item => item.id === activeArchiveIndex);
            if (currentIndex === -1) currentIndex = 0;

            let nextIndex = currentIndex + direction;

            if (nextIndex >= viewFilteredCollection.length) {
                nextIndex = 0; // Infinite Carousel Loop Right Bounds
            } else if (nextIndex < 0) {
                nextIndex = viewFilteredCollection.length - 1; // Infinite Carousel Loop Left Bounds
            }

            launchPlayerModal(viewFilteredCollection[nextIndex].id);
        }

        function playRandomAvailableEdit() {
            if (viewFilteredCollection.length === 0) return;
            const targetIndex = Math.floor(Math.random() * viewFilteredCollection.length);
            launchPlayerModal(viewFilteredCollection[targetIndex].id);
        }

        // --- EVENT INTERFACING SYSTEM ---
        openVaultBtn.addEventListener('click', () => {
            landingScreen.classList.add('hidden');
            vaultApp.classList.add('visible');
        });

        searchInput.addEventListener('input', (e) => executeVaultFilter(e.target.value));
        randomBtn.addEventListener('click', playRandomAvailableEdit);
        modalCloseBtn.addEventListener('click', closePlayerModal);
        modalPrevBtn.addEventListener('click', () => traverseModalIndex(-1));
        modalNextBtn.addEventListener('click', () => traverseModalIndex(1));

        // Close via overlay click background target bounds logic
        playerModal.addEventListener('click', (e) => {
            if (e.target === playerModal) closePlayerModal();
        });

        // HTML Video Stream State Tracking
        mainPlayer.addEventListener('canplay', () => videoSpinner.style.display = 'none');
        mainPlayer.addEventListener('waiting', () => videoSpinner.style.display = 'block');

        // --- ACCESSIBILITY KEYBOARD SHORTCUT ENGINE ---
        window.addEventListener('keydown', (e) => {
            if (!playerModal.classList.contains('active')) return;

            switch(e.key) {
                case 'Escape':
                    closePlayerModal();
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    traverseModalIndex(-1);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    traverseModalIndex(1);
                    e.preventDefault();
                    break;
                case ' ':
                    if (mainPlayer.paused) {
                        mainPlayer.play();
                    } else {
                        mainPlayer.pause();
                    }
                    e.preventDefault();
                    break;
            }
        });

        // Initialize Runtime Engine Instantiation 
        generateVaultCore();
    </script>
</body>
</html>
